short_bio_text_justify: false
short_bio: >-
  <p>
    许伟博士，质谱分析与代谢组学研究员，中国科学院合肥物质科学研究院在站博士后。研究方向聚焦于质谱分析技术、挥发性有机物（VOCs）高灵敏检测、疾病筛查与细菌鉴别、呼气分析与代谢快检。
  </p>
  <p>
    依托质子转移反应质谱（PTR-MS）平台，发展面向临床需求的快速、非侵入式代谢组学检测新方法。致力于将质谱快检技术推向感染性疾病早期筛查与精准诊断应用。
  </p>

